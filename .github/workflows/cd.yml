name: CD

on:
  push:
    branches: [ main ]

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: gearshow-backend
  CONTAINER_NAME: gearshow-backend
  EC2_APP_DIR: /home/ec2-user/gearshow

jobs:
  # 1. 빌드 & 테스트
  build-and-test:
    name: 빌드 & 테스트
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Gradle 실행 권한 부여
        run: chmod +x backend/gradlew

      - name: 빌드 및 테스트
        working-directory: backend
        run: ./gradlew build

  # 2. Docker 이미지 빌드 & ECR 푸시
  docker-push:
    name: Docker 이미지 빌드 & ECR 푸시
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 & 푸시
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # 3. EC2 배포 (docker compose 기반)
  deploy:
    name: EC2 배포
    needs: docker-push
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 레지스트리 주소 조회
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 인프라 정의(compose 파일)도 버전 관리되므로, 매 배포마다 EC2에 동기화한다
      - name: docker-compose.prod.yml 을 EC2로 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: ${{ env.EC2_APP_DIR }}

      - name: EC2 에서 backend 컨테이너 재기동
        uses: appleboy/ssh-action@v1
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          AWS_REGION: ${{ env.AWS_REGION }}
          EC2_APP_DIR: ${{ env.EC2_APP_DIR }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          # EC2 인스턴스에 IAM Role 이 붙어있지 않으므로 ECR 로그인용 자격증명을
          # GitHub Secrets 에서 직접 주입한다. AWS CLI 가 이 환경변수들을 자동 인식.
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,IMAGE_TAG,AWS_REGION,EC2_APP_DIR,CONTAINER_NAME,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY
          script: |
            set -e
            cd "$EC2_APP_DIR"

            # ECR 로그인
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # compose 에서 사용하는 변수 주입
            export ECR_REGISTRY IMAGE_TAG

            # Kafka 가 아직 안 떠 있으면 먼저 기동 (이미 healthy 면 no-op)
            docker compose -f docker-compose.prod.yml up -d kafka

            # 새 backend 이미지 pull 후 교체
            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d backend

            # 헬스체크 (최대 60초 대기)
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
                echo "✅ 헬스체크 성공 (image: $IMAGE_TAG)"
                exit 0
              fi
              echo "헬스체크 대기중... ($i/12)"
              sleep 5
            done

            echo "❌ 헬스체크 실패 - 최근 로그"
            docker compose -f docker-compose.prod.yml logs --tail=200 backend
            exit 1
