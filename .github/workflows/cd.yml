name: CD

on:
  push:
    branches: [ main ]

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: gearshow-backend
  CONTAINER_NAME: gearshow-backend

jobs:
  # 1. 빌드 & 테스트
  build-and-test:
    name: 빌드 & 테스트
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Gradle 실행 권한 부여
        run: chmod +x backend/gradlew

      - name: 빌드 및 테스트
        working-directory: backend
        run: ./gradlew build

  # 2. Docker 이미지 빌드 & ECR 푸시
  docker-push:
    name: Docker 이미지 빌드 & ECR 푸시
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 & 푸시
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # 3. EC2 배포
  deploy:
    name: EC2 배포
    needs: docker-push
    runs-on: ubuntu-latest
    steps:
      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 레지스트리 주소 조회
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: EC2에 배포
        uses: appleboy/ssh-action@v1
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,CONTAINER_NAME,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION
          script: |
            # ECR 로그인
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

            # 최신 이미지 풀
            docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest

            # 기존 컨테이너 중지 & 삭제
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            # 새 컨테이너 실행 (.env 파일에서 환경변수 로드)
            docker run -d \
              --name $CONTAINER_NAME \
              --env-file /home/ec2-user/.env \
              -p 8080:8080 \
              --restart unless-stopped \
              $ECR_REGISTRY/$ECR_REPOSITORY:latest

            # 헬스체크 (최대 30초 대기)
            for i in $(seq 1 6); do
              if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
                echo "헬스체크 성공"
                exit 0
              fi
              echo "헬스체크 대기중... ($i/6)"
              sleep 5
            done

            echo "헬스체크 실패"
            docker logs $CONTAINER_NAME
            exit 1
