services:
  mysql:
    image: mysql:8.0.36
    container_name: gearshow-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gearshow
      MYSQL_USER: gearshow
      MYSQL_PASSWORD: gearshow
    volumes:
      - gearshow-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password --skip-log-bin

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: gearshow-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: gearshow-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - gearshow-kafka-data:/var/lib/kafka/data
    depends_on:
      - zookeeper

volumes:
  gearshow-mysql-data:
  gearshow-kafka-data:
