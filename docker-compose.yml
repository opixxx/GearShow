# ===========================================
# 로컬 개발 환경용 docker-compose
# ===========================================
# 사용법:
#   docker compose up -d
#
# 구성:
#   - MySQL 8.0 (포트 3306)
#   - Kafka 3.9 (KRaft 모드, 포트 9092)
#
# 주의: 백엔드는 이 compose에 포함되지 않는다.
#       개발자는 IDE(IntelliJ 등)에서 직접 실행하며
#       backend/.env 파일의 localhost:3306 / localhost:9092 로 접속한다.
#
# 운영(EC2) 배포는 docker-compose.prod.yml 을 사용한다.
# ===========================================

services:
  mysql:
    image: mysql:8.0.36
    container_name: gearshow-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gearshow
      MYSQL_USER: gearshow
      MYSQL_PASSWORD: gearshow
    volumes:
      - gearshow-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --skip-log-bin
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  kafka:
    # Apache 공식 이미지, KRaft 모드 (Zookeeper 불필요)
    image: apache/kafka:3.9.0
    container_name: gearshow-kafka
    ports:
      # 로컬 개발자가 IDE에서 실행하는 백엔드가 접속할 수 있도록 호스트 노출
      - "9092:9092"
    environment:
      # --- KRaft 기본 설정 ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@gearshow-kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      # --- 이중 리스너 설정 ---
      # INTERNAL : 같은 docker 네트워크의 다른 컨테이너가 접속하는 용도
      # EXTERNAL : 호스트(로컬 PC)에서 접속하는 용도 (IDE 디버깅 등)
      # CONTROLLER : KRaft 컨트롤러 전용 (클라이언트가 붙으면 안 됨)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://gearshow-kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # --- 단일 브로커 개발 환경용 복제/ISR 설정 ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - gearshow-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  gearshow-mysql-data:
  gearshow-kafka-data:
