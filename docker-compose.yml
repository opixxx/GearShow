# ===========================================
# 로컬 개발 환경용 docker-compose
# ===========================================
# 사용법:
#   docker compose up -d
#
# 구성:
#   - MySQL 8.0 (포트 3306)
#   - Kafka 3.9 (KRaft 모드, 포트 9092)
#
# 주의: 백엔드는 이 compose에 포함되지 않는다.
#       개발자는 IDE(IntelliJ 등)에서 직접 실행하며
#       backend/.env 파일의 localhost:3306 / localhost:9092 로 접속한다.
#
# 운영(EC2) 배포는 docker-compose.prod.yml 을 사용한다.
# ===========================================

services:
  mysql:
    image: mysql:8.0.36
    container_name: gearshow-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gearshow
      MYSQL_USER: gearshow
      MYSQL_PASSWORD: gearshow
    volumes:
      - gearshow-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --skip-log-bin
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  kafka:
    # Apache 공식 이미지, KRaft 모드 (Zookeeper 불필요)
    image: apache/kafka:3.9.0
    container_name: gearshow-kafka
    # CONTROLLER 리스너를 hostname 으로 바인딩하기 위해 명시적으로 설정
    hostname: gearshow-kafka
    ports:
      # 로컬 개발자가 IDE에서 실행하는 백엔드가 접속할 수 있도록 호스트 노출
      - "9092:9092"
    environment:
      # --- KRaft 기본 설정 ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@gearshow-kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      # --- 리스너 바인딩 ---
      # INTERNAL   : 0.0.0.0 에 바인딩 (healthcheck 의 localhost:29092 접근 + 컨테이너 간 통신)
      # CONTROLLER : 컨테이너 hostname 에 바인딩 (0.0.0.0 이면 Kafka 3.9 검증 규칙에 의해 기동 거부)
      # EXTERNAL   : 0.0.0.0 에 바인딩 (호스트 포트 매핑으로 IDE 연결 허용)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://gearshow-kafka:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://gearshow-kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # --- 단일 브로커 개발 환경용 복제/ISR 설정 ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - gearshow-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ===========================================
  # Observability Stack (로컬 개발용)
  # ===========================================
  # IDE 에서 실행되는 백엔드가 localhost:8080 으로 노출한 /actuator/prometheus 를
  # 도커 네트워크 내부에서 스크래핑하기 위해 host.docker.internal 을 사용한다.
  # (macOS/Windows 에서는 기본 지원, Linux 에서는 extra_hosts 로 별칭 부여)
  # ===========================================

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: gearshow-prometheus
    hostname: prometheus
    ports:
      - "9090:9090"  # 로컬에서 직접 Prometheus UI 접근 가능
    volumes:
      - ./observability/prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
      - gearshow-prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=3d'
      - '--web.enable-lifecycle'
    extra_hosts:
      # Linux 도커에서 host.docker.internal 을 호스트 IP 로 매핑
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: gearshow-grafana
    hostname: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"  # 로컬만. 운영은 꺼야 함
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - gearshow-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: gearshow-node-exporter
    hostname: node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    restart: unless-stopped

volumes:
  gearshow-mysql-data:
  gearshow-kafka-data:
  gearshow-prometheus-data:
  gearshow-grafana-data:
