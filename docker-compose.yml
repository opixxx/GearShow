version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: gearshow-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gearshow
      MYSQL_USER: gearshow
      MYSQL_PASSWORD: gearshow
    volumes:
      - gearshow-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  gearshow-mysql-data:
