spring:
  application:
    name: GearShow

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false

  kafka:
    # default 값을 의도적으로 두지 않는다.
    # 운영 환경에서 환경변수 누락 시 localhost:9092 로 조용히 fallback 되어 기동이 실패해도
    # 원인 파악이 어려운 사고를 막기 위해 fail-fast 로 동작시킨다.
    # (테스트 프로파일에서는 KafkaAutoConfiguration 을 exclude 하므로 이 값이 resolve 되지 않음)
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    enabled: ${KAFKA_ENABLED:false}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8080

# ===========================================
# Spring Boot Actuator / Micrometer 설정 (Observability)
# ===========================================
# - /actuator/prometheus : Prometheus 가 스크래핑할 지표 엔드포인트
# - /actuator/health     : 헬스체크 (로드밸런서/스크래핑용, details 비공개)
# - /actuator/info       : 빌드 정보 등 공개 메타데이터
# 보안: /actuator/metrics 는 노출하지 않음 (내부 메트릭 정보 노출 방지).
#      /actuator/prometheus 는 Security 에서 permitAll 로 열지만,
#      운영 전환 시에는 관리 포트 분리 또는 인증 게이팅을 검토해야 한다.
# ===========================================
management:
  endpoints:
    web:
      exposure:
        # 화이트리스트 방식: 명시한 것만 노출
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      # 상세 정보(DB / Kafka / CircuitBreaker 상태)는 인증된 사용자에게만 노출
      show-details: when-authorized
      show-components: when-authorized
  metrics:
    tags:
      # 여러 서비스가 같은 Prometheus 로 스크래핑될 때를 대비한 식별 라벨
      application: ${spring.application.name}
    distribution:
      # HTTP 요청 지연시간 p50/p95/p99 히스토그램을 Prometheus 로 내보낸다.
      # 이게 없으면 Grafana 에서 percentile 계산이 불가능하다.
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      # SLO 버킷 — 이 경계값들이 Grafana 에서 heatmap/apdex 계산 기반이 된다
      slo:
        http.server.requests: 100ms, 300ms, 500ms, 1s, 3s

# AWS S3 설정
cloud:
  aws:
    s3:
      region: ${AWS_S3_REGION:ap-northeast-2}
      access-key: ${AWS_S3_ACCESS_KEY}
      secret-key: ${AWS_S3_SECRET_KEY}
      bucket: ${AWS_S3_BUCKET}
      cdn-url: ${AWS_S3_CDN_URL}
      endpoint: ${AWS_S3_ENDPOINT:}

# Tripo 3D 모델 생성 API 설정
tripo:
  enabled: ${TRIPO_ENABLED:false}
  api-key: ${TRIPO_API_KEY:}
  base-url: ${TRIPO_BASE_URL:https://api.tripo3d.ai/v2/openapi}
  poll-interval-ms: ${TRIPO_POLL_INTERVAL_MS:3000}
  timeout-ms: ${TRIPO_TIMEOUT_MS:300000}
  model-version: ${TRIPO_MODEL_VERSION:v2.5-20250123}

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: 3600000      # 1시간
  refresh-token-expiration-ms: 1209600000  # 14일

# OAuth 설정
oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
  apple:
    client-id: ${APPLE_CLIENT_ID}
    team-id: ${APPLE_TEAM_ID}
    key-id: ${APPLE_KEY_ID}
    private-key-path: ${APPLE_PRIVATE_KEY_PATH:}
    token-uri: https://appleid.apple.com/auth/token
    redirect-uri: ${APPLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/login/apple}
