spring:
  application:
    name: GearShow

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:}
    enabled: ${KAFKA_ENABLED:false}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8080

# AWS S3 설정
cloud:
  aws:
    s3:
      region: ${AWS_S3_REGION:ap-northeast-2}
      access-key: ${AWS_S3_ACCESS_KEY}
      secret-key: ${AWS_S3_SECRET_KEY}
      bucket: ${AWS_S3_BUCKET}
      cdn-url: ${AWS_S3_CDN_URL}
      endpoint: ${AWS_S3_ENDPOINT:}

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: 3600000      # 1시간
  refresh-token-expiration-ms: 1209600000  # 14일

# OAuth 설정
oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
  apple:
    client-id: ${APPLE_CLIENT_ID}
    team-id: ${APPLE_TEAM_ID}
    key-id: ${APPLE_KEY_ID}
    private-key-path: ${APPLE_PRIVATE_KEY_PATH:}
    token-uri: https://appleid.apple.com/auth/token
    redirect-uri: ${APPLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/login/apple}
