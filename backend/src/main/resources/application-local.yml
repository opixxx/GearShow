# ===========================================
# 로컬 개발 환경 설정
# docker-compose.yml의 MySQL + LocalStack 사용
# ===========================================
spring:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
