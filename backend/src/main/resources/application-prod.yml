# ===========================================
# 운영 환경 설정 (EC2 배포)
# ===========================================

# ===========================================
# 관리 포트 분리 (Actuator 외부 노출 차단)
# ===========================================
# actuator 엔드포인트를 메인 API 포트(8080) 가 아닌 별도 포트(9091) 에서 서비스한다.
# 9091 은 docker compose 의 ports: 매핑에 포함되지 않고 EC2 보안 그룹에도 등록되지 않으므로,
# 인터넷/EC2 호스트에서는 접근 불가. 같은 compose 네트워크의 Prometheus 컨테이너만
# backend:9091 로 스크래핑할 수 있다.
#
# - address: 0.0.0.0 → 컨테이너 내부 모든 인터페이스에 바인딩 (Prometheus 컨테이너가 도달 가능해야 함)
# - port: 9091       → 메인 포트와 분리
# ===========================================
management:
  server:
    port: 9091
    address: 0.0.0.0

spring:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false

  # Kafka Consumer concurrency(기본 3) + 정리 스케줄러 + 일반 요청을 모두 수용
  # HikariCP 기본값(10)은 동시 메시지 처리 시 부족할 수 있어 명시적으로 상향
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN

# ===========================================
# 멱등성 이력 정리 설정 (CleanupProcessedMessageService)
# 값은 @Validated + @Min으로 Bean 생성 시점에 검증된다
# ===========================================
app:
  idempotency:
    retention-days: 7
    cleanup-batch-size: 1000
    cleanup-batch-sleep-ms: 50
    # 매일 새벽 3시 정리
    cleanup-cron: "0 0 3 * * *"
    cleanup-zone: Asia/Seoul

  # Transactional Outbox Relay 설정
  outbox:
    relay-interval-ms: 1000        # 1초 주기로 미발행 메시지 Kafka 발행
    batch-size: 100                # 한 주기당 최대 100건
    publish-timeout-ms: 5000       # Kafka 발행 동기 대기 타임아웃
    cleanup-cron: "0 0 4 * * *"    # 새벽 4시 발행 완료 레코드 정리
    cleanup-zone: Asia/Seoul
    retention-days: 7              # 발행 완료 후 7일 보존
    cleanup-batch-size: 1000
    cleanup-batch-sleep-ms: 50

  # Tripo 폴링 스케줄러 설정
  tripo-polling:
    interval-ms: 3000              # 3초 주기로 GENERATING 모델 상태 확인
    batch-size: 20                 # 한 주기당 최대 20건 폴링
    task-timeout-minutes: 15       # 15분 초과 시 자동 FAILED

  # 좀비 모델 복구 스케줄러 설정
  stuck-recovery:
    interval-ms: 60000                                # 1분 주기로 stuck 검사
    batch-size: 50
    requested-stuck-minutes: 5                        # REQUESTED 5분 초과 시 Outbox 재등록
    preparing-stuck-minutes: 2                        # PREPARING 2분 초과 시 자동 재시도 (retryCount 적용)
    generating-without-task-id-stuck-minutes: 5       # GENERATING + task_id 없음 5분 초과 시 FAILED

# ===========================================
# Resilience4j Circuit Breaker (Tripo API 보호)
# ===========================================
# - slidingWindowSize(10) 호출 중 failureRateThreshold(50%) 실패 시 OPEN
# - OPEN 후 waitDurationInOpenState(30s) 동안 모든 호출 차단 (fast-fail)
# - 이후 HALF_OPEN 상태로 전환, permittedNumberOfCallsInHalfOpenState(3) 건 시도
# - OPEN 상태에서 상위 레이어가 CallNotPermittedException 을 잡아 모델을 UNAVAILABLE 로 전환
resilience4j:
  circuitbreaker:
    instances:
      tripo:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

# ===========================================
# Kafka 운영 메모
# acks=all이 실제 내구성을 보장하려면 브로커/토픽의 min.insync.replicas >= 2 필수
# MSK 도입 시 토픽 생성 옵션에서 설정: --config min.insync.replicas=2
# ===========================================
