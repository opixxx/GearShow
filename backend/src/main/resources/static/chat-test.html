<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GearShow 채팅 테스트</title>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #111; color: #eee; padding: 20px; }
    h1 { font-size: 20px; margin-bottom: 16px; color: #19C37D; }
    .section { background: #1a1a1a; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .section h2 { font-size: 14px; color: #888; margin-bottom: 8px; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 4px; }
    input, select { width: 100%; padding: 8px 12px; border: 1px solid #333; border-radius: 8px;
      background: #222; color: #eee; font-size: 14px; margin-bottom: 8px; }
    button { padding: 8px 16px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
      font-weight: 600; margin-right: 6px; margin-bottom: 6px; }
    .btn-primary { background: #19C37D; color: #000; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-secondary { background: #333; color: #eee; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #log { background: #0a0a0a; border: 1px solid #333; border-radius: 8px; padding: 12px;
      height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; line-height: 1.6; }
    #messages { background: #0a0a0a; border: 1px solid #333; border-radius: 8px; padding: 12px;
      height: 300px; overflow-y: auto; }
    .msg { padding: 8px 12px; margin-bottom: 6px; border-radius: 8px; max-width: 80%; }
    .msg-mine { background: #19C37D; color: #000; margin-left: auto; text-align: right; }
    .msg-other { background: #333; }
    .msg-meta { font-size: 11px; color: #888; margin-top: 2px; }
    .status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .status-connected { background: #19C37D; }
    .status-disconnected { background: #ef4444; }
    .row { display: flex; gap: 8px; align-items: end; }
    .row input { flex: 1; margin-bottom: 0; }
    .flex-row { display: flex; gap: 8px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <h1>GearShow 채팅 WebSocket 테스트</h1>

  <!-- 1. 연결 설정 -->
  <div class="section">
    <h2>1. 연결 설정</h2>
    <label>API Base URL</label>
    <input id="baseUrl" value="http://localhost:8080">
    <div class="flex-row">
      <button class="btn-primary" onclick="doDevLogin()">Dev 로그인</button>
      <button class="btn-secondary" onclick="doConnect()" id="btnConnect" disabled>WebSocket 연결</button>
      <button class="btn-danger" onclick="doDisconnect()" id="btnDisconnect" disabled>연결 해제</button>
    </div>
    <p style="margin-top:8px; font-size:13px;">
      상태: <span class="status status-disconnected" id="statusDot"></span>
      <span id="statusText">미연결</span>
      &nbsp;|&nbsp; 사용자: <span id="userInfo">-</span>
    </p>
  </div>

  <!-- 2. 채팅방 -->
  <div class="section">
    <h2>2. 채팅방</h2>
    <div class="flex-row" style="margin-bottom:8px;">
      <div style="flex:1;">
        <label>쇼케이스 ID로 채팅방 생성/조회</label>
        <div class="row">
          <input id="showcaseId" placeholder="쇼케이스 ID" type="number">
          <button class="btn-primary" onclick="doCreateRoom()" id="btnCreateRoom" disabled>생성</button>
        </div>
      </div>
      <div style="flex:1;">
        <label>채팅방 ID로 직접 구독</label>
        <div class="row">
          <input id="chatRoomId" placeholder="채팅방 ID" type="number">
          <button class="btn-secondary" onclick="doSubscribe()" id="btnSubscribe" disabled>구독</button>
        </div>
      </div>
    </div>
    <button class="btn-secondary" onclick="doListRooms()" id="btnListRooms" disabled>내 채팅방 목록</button>
  </div>

  <!-- 3. 메시지 -->
  <div class="section">
    <h2>3. 메시지 (채팅방: <span id="currentRoom">-</span>)</h2>
    <div id="messages"></div>
    <div class="row" style="margin-top:8px;">
      <input id="msgInput" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter') doSend()">
      <button class="btn-primary" onclick="doSend()" id="btnSend" disabled>전송</button>
    </div>
  </div>

  <!-- 4. 로그 -->
  <div class="section">
    <h2>4. 로그</h2>
    <div id="log"></div>
  </div>

<script>
let stompClient = null;
let token = null;
let userId = null;
let currentRoomId = null;
let subscription = null;

function log(msg, type = 'info') {
  const el = document.getElementById('log');
  const colors = { info: '#aaa', ok: '#19C37D', err: '#ef4444', ws: '#22D3EE' };
  el.innerHTML += `<div style="color:${colors[type] || '#aaa'}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function setStatus(connected) {
  document.getElementById('statusDot').className = `status ${connected ? 'status-connected' : 'status-disconnected'}`;
  document.getElementById('statusText').textContent = connected ? '연결됨' : '미연결';
  document.getElementById('btnConnect').disabled = connected || !token;
  document.getElementById('btnDisconnect').disabled = !connected;
  document.getElementById('btnSubscribe').disabled = !connected;
  document.getElementById('btnSend').disabled = !connected || !currentRoomId;
  document.getElementById('btnCreateRoom').disabled = !token;
  document.getElementById('btnListRooms').disabled = !token;
}

function baseUrl() { return document.getElementById('baseUrl').value.replace(/\/$/, ''); }

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(baseUrl() + path, opts);
  const json = await res.json();
  if (res.status >= 400) throw new Error(json.message || `HTTP ${res.status}`);
  return json;
}

function parseJwtUserId(jwt) {
  try {
    const payload = JSON.parse(atob(jwt.split('.')[1]));
    return parseInt(payload.sub);
  } catch (e) { return null; }
}

async function doDevLogin() {
  try {
    const json = await api('POST', '/api/v1/auth/dev-login');
    token = json.data.accessToken;
    userId = parseJwtUserId(token);
    document.getElementById('userInfo').textContent = `userId=${userId}`;
    document.getElementById('btnConnect').disabled = false;
    document.getElementById('btnCreateRoom').disabled = false;
    document.getElementById('btnListRooms').disabled = false;
    log(`로그인 성공: userId=${userId}`, 'ok');
  } catch (e) { log(`로그인 실패: ${e.message}`, 'err'); }
}

function doConnect() {
  const url = baseUrl() + '/ws';
  log(`SockJS 연결 시도: ${url}`, 'ws');
  const socket = new SockJS(url);
  stompClient = Stomp.over(socket);
  stompClient.debug = (msg) => log(`STOMP: ${msg}`, 'ws');

  stompClient.connect(
    { Authorization: `Bearer ${token}` },
    function(frame) {
      log('STOMP 연결 성공', 'ok');
      setStatus(true);
    },
    function(error) {
      log(`STOMP 연결 실패: ${error}`, 'err');
      setStatus(false);
      stompClient = null;
    }
  );
}

function doDisconnect() {
  if (stompClient) {
    stompClient.disconnect(() => {
      log('연결 해제됨', 'info');
      setStatus(false);
      stompClient = null;
      subscription = null;
      currentRoomId = null;
      document.getElementById('currentRoom').textContent = '-';
    });
  }
}

async function doCreateRoom() {
  const showcaseId = parseInt(document.getElementById('showcaseId').value);
  if (!showcaseId) { log('쇼케이스 ID를 입력하세요', 'err'); return; }
  try {
    const json = await api('POST', '/api/v1/chat-rooms', { showcaseId });
    const roomId = json.data.chatRoomId;
    log(`채팅방 생성/조회 성공: chatRoomId=${roomId}`, 'ok');
    document.getElementById('chatRoomId').value = roomId;
    if (stompClient) doSubscribe();
  } catch (e) { log(`채팅방 생성 실패: ${e.message}`, 'err'); }
}

async function doListRooms() {
  try {
    const json = await api('GET', '/api/v1/chat-rooms');
    const rooms = json.data?.data || [];
    log(`채팅방 ${rooms.length}개 조회됨`, 'ok');
    rooms.forEach(r => log(`  - roomId=${r.chatRoomId}, showcase=${r.showcaseId}, lastMsg=${r.lastMessageContent || '없음'}`, 'info'));
  } catch (e) { log(`채팅방 목록 실패: ${e.message}`, 'err'); }
}

function doSubscribe() {
  const roomId = parseInt(document.getElementById('chatRoomId').value);
  if (!roomId) { log('채팅방 ID를 입력하세요', 'err'); return; }
  if (subscription) { subscription.unsubscribe(); log('기존 구독 해제', 'info'); }

  currentRoomId = roomId;
  document.getElementById('currentRoom').textContent = roomId;
  document.getElementById('btnSend').disabled = false;
  document.getElementById('messages').innerHTML = '';

  subscription = stompClient.subscribe(`/topic/chat-rooms/${roomId}`, function(frame) {
    const data = JSON.parse(frame.body);
    log(`메시지 수신: seq=${data.payload.seq}`, 'ws');
    appendMessage(data.payload);
  });
  log(`채팅방 ${roomId} 구독 시작`, 'ok');

  // 기존 메시지 로드
  loadMessages(roomId);
}

async function loadMessages(roomId) {
  try {
    const json = await api('GET', `/api/v1/chat-rooms/${roomId}/messages?size=50`);
    const msgs = json.data?.data || [];
    msgs.reverse().forEach(m => appendMessage(m));
    log(`기존 메시지 ${msgs.length}개 로드`, 'info');
  } catch (e) { log(`메시지 로드 실패: ${e.message}`, 'err'); }
}

function appendMessage(msg) {
  const el = document.getElementById('messages');
  const isMine = msg.senderId === userId;
  const time = new Date(msg.sentAt).toLocaleTimeString();
  el.innerHTML += `
    <div class="msg ${isMine ? 'msg-mine' : 'msg-other'}">
      <div>${msg.content}</div>
      <div class="msg-meta">${isMine ? '나' : 'user#' + msg.senderId} · seq ${msg.seq} · ${time}</div>
    </div>`;
  el.scrollTop = el.scrollHeight;
}

function doSend() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content || !currentRoomId) return;

  stompClient.send(`/app/chat-rooms/${currentRoomId}/send`, {}, JSON.stringify({
    messageType: 'TEXT',
    content: content,
    clientMessageId: crypto.randomUUID()
  }));
  log(`메시지 발신: "${content}"`, 'info');
  input.value = '';
  input.focus();
}

setStatus(false);
</script>
</body>
</html>
