spring:
  datasource:
    url: jdbc:tc:mysql:8.0:///gearshow?TC_REUSABLE=true
    username: gearshow
    password: gearshow
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false
