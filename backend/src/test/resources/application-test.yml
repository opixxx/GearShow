spring:
  datasource:
    url: jdbc:tc:mysql:8.0:///gearshow?TC_REUSABLE=true
    username: gearshow
    password: gearshow
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

# JWT 테스트용 설정
jwt:
  secret: test-secret-key-for-unit-testing-purposes-only-minimum-256-bits-required
  access-token-expiration-ms: 3600000
  refresh-token-expiration-ms: 1209600000

# OAuth 테스트용 설정 (실제 호출하지 않음, Mock 사용)
oauth:
  kakao:
    client-id: test-kakao-client-id
    client-secret: test-kakao-client-secret
    redirect-uri: http://localhost:8080/api/v1/auth/login/kakao
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
  apple:
    client-id: test-apple-client-id
    team-id: test-apple-team-id
    key-id: test-apple-key-id
    private-key-path:
    token-uri: https://appleid.apple.com/auth/token
    redirect-uri: http://localhost:8080/api/v1/auth/login/apple
