# ===========================================
# EC2 운영 배포용 docker-compose
# ===========================================
# 사용법 (EC2에서):
#   cd /home/ec2-user/gearshow
#   export ECR_REGISTRY=<your-ecr-registry>
#   export IMAGE_TAG=<git-sha-or-latest>
#   docker compose -f docker-compose.prod.yml pull backend
#   docker compose -f docker-compose.prod.yml up -d
#
# 구성:
#   - Kafka 3.9 (KRaft, 호스트 포트 노출 없음 → 외부 접근 차단)
#   - backend (ECR 이미지, Kafka는 내부 네트워크로, DB는 RDS로 접속)
#
# MySQL은 포함되지 않는다 — AWS RDS 사용.
# 필수 환경변수는 같은 디렉토리의 .env 파일에서 주입된다.
# ===========================================

services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: gearshow-kafka
    # 포트 노출 없음: EC2 외부/호스트에서 직접 접근 불가.
    # 디버깅이 필요하면 `docker exec gearshow-kafka ...` 로 들어가서 확인한다.
    environment:
      # --- KRaft 기본 설정 ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@gearshow-kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      # --- 이중 리스너 ---
      # 백엔드 컨테이너는 INTERNAL(29092)로 접속한다.
      # EXTERNAL은 정의만 해두고 포트는 노출하지 않음 (현재는 사실상 미사용).
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://gearshow-kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # --- 단일 브로커 운영 (MSK 이관 전까지) ---
      # 운영에서 진짜 acks=all을 보장하려면 브로커 2대 이상 + min.insync.replicas >= 2 가 필요하다.
      # 현재는 단일 브로커라 min.insync.replicas=1 로 유지한다.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - gearshow-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  backend:
    image: ${ECR_REGISTRY}/gearshow-backend:${IMAGE_TAG:-latest}
    container_name: gearshow-backend
    # .env 파일에서 DB_URL/DB_USERNAME/DB_PASSWORD/JWT/OAuth/S3/Tripo 등 주입
    env_file:
      - .env
    environment:
      # compose 에서 직접 고정 — .env 값과 별개로 강제
      SPRING_PROFILES_ACTIVE: prod
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: gearshow-kafka:29092
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

volumes:
  gearshow-kafka-data:
