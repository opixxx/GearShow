# ===========================================
# EC2 운영 배포용 docker-compose
# ===========================================
# 사용법 (EC2에서):
#   cd /home/ec2-user/gearshow
#   export ECR_REGISTRY=<your-ecr-registry>
#   export IMAGE_TAG=<git-sha-or-latest>
#   docker compose -f docker-compose.prod.yml pull backend
#   docker compose -f docker-compose.prod.yml up -d
#
# 구성:
#   - Kafka 3.9 (KRaft, 호스트 포트 노출 없음 → 외부 접근 차단)
#   - backend (ECR 이미지, Kafka는 내부 네트워크로, DB는 RDS로 접속)
#
# MySQL은 포함되지 않는다 — AWS RDS 사용.
# 필수 환경변수는 같은 디렉토리의 .env 파일에서 주입된다.
# ===========================================

services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: gearshow-kafka
    # 컨테이너 hostname 을 명시해야 CONTROLLER 리스너를 gearshow-kafka:9093 로
    # 바인딩할 수 있다. container_name 은 docker ps 이름일 뿐 컨테이너의 /etc/hostname 을
    # 바꾸지 않으므로 별도 설정 필수.
    hostname: gearshow-kafka
    # 포트 노출 없음: EC2 외부/호스트에서 직접 접근 불가.
    # 디버깅이 필요하면 `docker exec gearshow-kafka ...` 로 들어가서 확인한다.
    environment:
      # --- KRaft 기본 설정 ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@gearshow-kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      # --- 리스너 바인딩 ---
      # INTERNAL  : 모든 인터페이스(0.0.0.0)에 바인딩하여 healthcheck 의 localhost:29092 접근 허용
      # CONTROLLER: 컨테이너 hostname 에 바인딩. 0.0.0.0 으로 두면 Kafka 가 advertised.listeners
      #             자동 유도 시 nonroutable 로 판정하여 기동 실패한다 (Kafka 3.9 검증 규칙).
      # EXTERNAL  : 정의만 해두고 포트 노출 없음 (미사용)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://gearshow-kafka:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://gearshow-kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # --- 단일 브로커 운영 (MSK 이관 전까지) ---
      # 운영에서 진짜 acks=all을 보장하려면 브로커 2대 이상 + min.insync.replicas >= 2 가 필요하다.
      # 현재는 단일 브로커라 min.insync.replicas=1 로 유지한다.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - gearshow-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  backend:
    image: ${ECR_REGISTRY}/gearshow-backend:${IMAGE_TAG:-latest}
    container_name: gearshow-backend
    hostname: backend
    # .env 파일에서 DB_URL/DB_USERNAME/DB_PASSWORD/JWT/OAuth/S3/Tripo 등 주입
    env_file:
      - .env
    environment:
      # compose 에서 직접 고정 — .env 값과 별개로 강제
      SPRING_PROFILES_ACTIVE: prod
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: gearshow-kafka:29092
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================
  # Observability Stack (Prometheus + Grafana + Node Exporter)
  # ===========================================
  # t3.small (RAM 2GB) 환경을 고려해 각 서비스에 mem_limit 을 엄격히 걸었다.
  # 총 메모리 예산: Prometheus 256m + Grafana 192m + Node-exporter 64m = 512m
  # 기존 Backend(~550m) + Kafka(~370m) + OS(~80m) = 1000m 에 추가되어 최대 1512m,
  # 여유 480m (swap 1G 까지 합치면 thrashing 방어 충분).
  # ===========================================

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: gearshow-prometheus
    hostname: prometheus
    volumes:
      # 스크래핑 설정은 Git 에서 CD 가 배포한 파일을 마운트
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - gearshow-prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      # 보존 기간 7일 + 디스크 512MB 상한 — t3.small 디스크 보호
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=512MB'
      - '--web.enable-lifecycle'
    mem_limit: 256m
    mem_reservation: 128m
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: gearshow-grafana
    hostname: grafana
    # 외부에서 대시보드 접근. 보안 그룹에서 포트 3000 을 본인 IP 로만 제한할 것.
    ports:
      - "3000:3000"
    environment:
      # 운영 전환 시 .env 의 GF_ADMIN_PASSWORD 를 강한 값으로 덮어쓴다
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_LOG_LEVEL: "warn"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - gearshow-grafana-data:/var/lib/grafana
    mem_limit: 192m
    mem_reservation: 96m
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: gearshow-node-exporter
    hostname: node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      # 컨테이너 안에서 호스트의 CPU/Memory/Disk/Net 지표를 읽어들임
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    mem_limit: 64m
    mem_reservation: 32m
    restart: unless-stopped

volumes:
  gearshow-kafka-data:
  gearshow-prometheus-data:
  gearshow-grafana-data:
