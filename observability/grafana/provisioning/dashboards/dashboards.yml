# ===========================================
# Grafana 대시보드 자동 프로비저닝 설정
# ===========================================
# /etc/grafana/provisioning/dashboards/ 아래의 JSON 파일들을
# 자동으로 Grafana 에 로드한다.
# 대시보드 파일은 나중에 추가하면 Grafana 재시작 없이 반영된다
# (updateIntervalSeconds 주기로 감지).
# ===========================================

apiVersion: 1

providers:
  - name: gearshow-default
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    # 프로비저닝 파일을 유일한 소스로 삼는다. UI 에서 편집해도 재프로비저닝 시
    # 파일 내용으로 덮어쓰기되어 혼란이 생기는 것을 막기 위해 UI 편집을 차단한다.
    # 대시보드 수정이 필요하면 JSON 파일을 직접 수정 → Git 커밋 → Grafana 가 자동 재로드.
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
