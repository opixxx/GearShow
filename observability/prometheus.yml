# ===========================================
# Prometheus 스크래핑 설정
# ===========================================
# - 스크래핑 주기 15초: t3.small 부하를 최소화하면서도
#   부하 테스트 관찰에 충분한 해상도
# - 보존 기간은 CLI 플래그(--storage.tsdb.retention.time)로 제어
# - 스크래핑 대상은 같은 docker compose 네트워크 안의 서비스 이름을 사용
# ===========================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # 모든 시계열에 자동 부착되는 라벨 (여러 환경 비교 대비)
  external_labels:
    project: gearshow

scrape_configs:
  # Prometheus 자기 자신 (메타 모니터링)
  - job_name: prometheus
    static_configs:
      - targets: [ 'localhost:9090' ]

  # Spring Boot 백엔드 — Micrometer 가 노출하는 /actuator/prometheus
  # http.server.requests, jvm.memory.*, hikaricp.*, kafka.consumer.* 등
  - job_name: gearshow-backend
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: [ 'backend:8080' ]
        labels:
          application: gearshow-backend
          component: api

  # 호스트 OS 지표 — CPU, 메모리, 디스크, 네트워크, Swap
  - job_name: node-exporter
    static_configs:
      - targets: [ 'node-exporter:9100' ]
        labels:
          host: gearshow-ec2
